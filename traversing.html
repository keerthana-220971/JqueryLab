<!DOCTYPE html>
<html>
<head>
    <title>Traversing</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<ul>
    <li>Item 1</li>
    <li id="second">Item 2</li>
    <li>Item 3</li>
</ul>

<button id="btn">Highlight Siblings</button>

<script>
$(function(){
    $("#btn").click(function(){
        $("#second").siblings().css("color","red");
    });
});
</script>

</body>
</html>
